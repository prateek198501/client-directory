<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HRK Client Directory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0d0d14;--surface:#16161f;--surface2:#1e1e2a;--surface3:#252535;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:#7a6030;
  --text:#e8e0d0;--text2:#9990a8;--text3:#5a5470;
  --green:#3ecf8e;--green-bg:#0d2a1e;
  --amber:#f5a623;--amber-bg:#2a1d0a;
  --blue:#4f8ef5;--blue-bg:#0d1e3a;
  --red:#e05c5c;--red-bg:#2a0d0d;
  --purple:#9b7ef8;--purple-bg:#1a1030;
  --teal:#2dd4bf;--teal-bg:#0a2228;
  --gray:#6b7280;--gray-bg:#1a1a22;
  --border:#262636;--border2:#30304a;
  --radius:10px;--radius-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --transition:.15s ease;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border2);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#7a4f10);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:.5px}
.logo-sub{font-size:10px;color:var(--text3);font-weight:500}
.header-search{flex:1;max-width:480px;position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 36px 9px 36px;color:var(--text);font-size:13px;outline:none;transition:border-color var(--transition);font-family:inherit}
.search-input:focus{border-color:var(--gold-dim)}
.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;display:none;padding:2px;line-height:1}
.search-clear.visible{display:block}
.header-count{flex-shrink:0;font-size:11px;color:var(--text3);white-space:nowrap}
.header-count strong{color:var(--gold);font-size:14px;font-weight:700}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 65px);overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── FILTERS ── */
.filter-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.filter-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:6px}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:4px 9px;border-radius:16px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;transition:all var(--transition);white-space:nowrap;font-family:inherit}
.chip:hover{border-color:var(--gold-dim);color:var(--gold)}
.chip.active{border-color:var(--gold);background:rgba(201,168,76,.12);color:var(--gold)}
.chip.all-chip.active{background:rgba(201,168,76,.18)}

/* status chips */
.chip[data-val="Active Client"].active,.chip[data-ts="Active Client"].active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.chip[data-val="Yet to Pitch"].active,.chip[data-ts="Yet to Pitch"].active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.chip[data-val="Under Communication"].active,.chip[data-ts="Under Communication"].active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.chip[data-val="Client Not Interested"].active,.chip[data-ts="Client Not Interested"].active,.chip[data-val="VJD Not Interested"].active,.chip[data-ts="VJD Not Interested"].active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.chip[data-val="Pricing Issue"].active,.chip[data-ts="Pricing Issue"].active,.chip[data-val="Payment Issue"].active,.chip[data-ts="Payment Issue"].active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.chip[data-val="Client Relationship Issue"].active,.chip[data-ts="Client Relationship Issue"].active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.chip[data-val="Retailer"].active,.chip[data-ts="Retailer"].active{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.chip[data-val="Potential"].active,.chip[data-ts="Potential"].active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.chip[data-val="Existing"].active,.chip[data-ts="Existing"].active{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* ── STATE SELECTOR ── */
.state-search-wrap{padding:10px 14px 6px;border-bottom:1px solid var(--border)}
.state-search{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.state-search:focus{border-color:var(--gold-dim)}
.state-search::placeholder{color:var(--text3)}
.state-list{overflow-y:auto;flex:1;padding:6px 8px}
.state-item{padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:space-between;transition:all var(--transition);gap:6px}
.state-item:hover{background:var(--surface2);color:var(--text)}
.state-item.active{background:rgba(201,168,76,.12);color:var(--gold);font-weight:700}
.state-item .s-count{font-size:10px;color:var(--text3);background:var(--surface3);border-radius:10px;padding:1px 6px;flex-shrink:0}
.state-item.active .s-count{color:var(--gold-dim)}

/* city select within sidebar */
.city-pills{padding:4px 8px 8px;display:flex;flex-wrap:wrap;gap:4px}
.city-pill{padding:3px 8px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;transition:all var(--transition);font-family:inherit}
.city-pill:hover{border-color:var(--gold-dim);color:var(--text)}
.city-pill.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}

/* ── TOPBAR ── */
.topbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);flex-shrink:0}
.sort-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:4px;font-family:inherit}
.sort-btn.active{background:var(--surface2);border-color:var(--gold-dim);color:var(--gold)}
.spacer{flex:1}
.view-toggle{display:flex;gap:3px;background:var(--surface2);border-radius:6px;padding:3px}
.vt-btn{width:28px;height:26px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--transition)}
.vt-btn.active{background:var(--surface3);color:var(--gold)}
.results-label{font-size:11px;color:var(--text3)}
.results-label strong{color:var(--text);font-weight:600}

/* ── CLIENT LIST ── */
.client-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.client-list.grid-view{flex-direction:row;flex-wrap:wrap;align-content:flex-start}
.client-list.grid-view .client-card{width:calc(50% - 3px)}

/* ── CLIENT CARD ── */
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.client-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);box-shadow:var(--shadow)}
.client-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.client-card.status-active::before{background:var(--green)}
.client-card.status-potential::before{background:var(--amber)}
.client-card.status-pitch::before{background:var(--blue)}
.client-card.status-comm::before{background:var(--amber)}
.client-card.status-not-interested::before{background:var(--red)}
.client-card.status-issue::before{background:var(--purple)}
.client-card.status-retailer::before{background:var(--teal)}

.card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:700;color:var(--text);flex:1;line-height:1.3}
.card-code{font-size:9px;font-weight:700;background:rgba(201,168,76,.15);color:var(--gold);border-radius:4px;padding:2px 5px;flex-shrink:0;margin-top:1px}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:6px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-teal{background:var(--teal-bg);color:var(--teal)}
.badge-gray{background:var(--gray-bg);color:var(--text2)}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold)}
.card-location{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.card-rep{font-size:10px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rep-dot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);flex-shrink:0}

/* ── DETAIL PANEL ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.detail-overlay.open{display:flex}
.detail-panel{background:var(--surface);border-radius:14px 14px 0 0;width:100%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.detail-name{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.2}
.detail-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.detail-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.detail-close:hover{background:var(--red-bg);color:var(--red)}
.detail-body{padding:14px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px}
.detail-section-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:6px}
.detail-address{font-size:12px;color:var(--text2);line-height:1.5;background:var(--surface2);border-radius:6px;padding:9px 11px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-field{background:var(--surface2);border-radius:6px;padding:8px 10px}
.detail-field label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px;font-weight:600}
.detail-field span{font-size:12px;color:var(--text);font-weight:500}
.rep-list{display:flex;flex-direction:column;gap:6px}
.rep-item{background:var(--surface2);border-radius:6px;padding:9px 11px;display:flex;align-items:center;gap:10px}
.rep-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),#3a2a10);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0}
.rep-info{flex:1;min-width:0}
.rep-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:1px}
.rep-contact{font-size:11px;color:var(--text2)}
.rep-call{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--green);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all var(--transition)}
.rep-call:hover{background:var(--green-bg);border-color:var(--green)}
.website-link{display:flex;align-items:center;gap:6px;padding:9px 11px;background:var(--surface2);border-radius:6px;color:var(--blue);font-size:12px;text-decoration:none;transition:all var(--transition)}
.website-link:hover{background:var(--blue-bg)}
.website-link svg{flex-shrink:0}

/* ── EMPTY STATE ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;text-align:center}
.empty-icon{font-size:48px;opacity:.3}
.empty-text{font-size:14px;color:var(--text3)}

/* ── MOBILE ── */
@media(max-width:700px){
  .sidebar{display:none}
  .layout{height:calc(100vh - 110px)}
  .header{flex-wrap:wrap;gap:10px}
  .header-logo{order:1}
  .header-count{order:2;margin-left:auto}
  .header-search{order:3;max-width:100%;width:100%}
  .mobile-filters{display:flex!important}
  .client-list.grid-view .client-card{width:100%}
  .detail-grid{grid-template-columns:1fr}
}
@media(min-width:701px){
  .detail-overlay{align-items:center}
  .detail-panel{border-radius:14px;max-height:82vh}
}
.mobile-filters{display:none;overflow-x:auto;padding:8px 12px;gap:6px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.mobile-filters::-webkit-scrollbar{display:none}
.mobile-filter-group{display:flex;gap:4px;flex-shrink:0}
.mf-sep{width:1px;background:var(--border2);flex-shrink:0;margin:2px 4px}

/* ── HIGHLIGHT ── */
mark{background:rgba(201,168,76,.25);color:var(--gold2);border-radius:2px;padding:0 2px}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text3);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">💎</div>
    <div>
      <div class="logo-text">HRK Directory</div>
      <div class="logo-sub">Client Intelligence</div>
    </div>
  </div>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="globalSearch" placeholder="Search by name, city, state, representative…" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="header-count"><strong id="countDisplay">929</strong> clients</div>
</div>

<!-- mobile filter strip -->
<div class="mobile-filters" id="mobileFilters">
  <div class="mobile-filter-group" id="mf-status"></div>
  <div class="mf-sep"></div>
  <div class="mobile-filter-group" id="mf-trip"></div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="filter-section">
      <div class="filter-label">Status</div>
      <div class="filter-chips" id="statusChips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Trip Status</div>
      <div class="filter-chips" id="tripChips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Zone</div>
      <div class="filter-chips" id="zoneChips"></div>
    </div>
    <div class="state-search-wrap">
      <div class="filter-label">State & City</div>
      <input class="state-search" id="stateSearch" placeholder="Filter states…" oninput="filterStates(this.value)">
    </div>
    <div class="state-list" id="stateList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="results-label"><strong id="resultCount">929</strong> results</span>
      <button class="sort-btn active" id="sortName" onclick="setSort('name')">A–Z Name</button>
      <button class="sort-btn" id="sortCity" onclick="setSort('city')">City</button>
      <button class="sort-btn" id="sortStatus" onclick="setSort('status')">Status</button>
      <div class="spacer"></div>
      <div class="view-toggle">
        <button class="vt-btn active" id="listBtn" onclick="setView('list')" title="List view">☰</button>
        <button class="vt-btn" id="gridBtn" onclick="setView('grid')" title="Grid view">⊞</button>
      </div>
    </div>
    <div class="client-list" id="clientList">
      <div class="loading"><div class="spinner"></div> Loading clients…</div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="overlayClick(event)">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-header">
      <div class="detail-drag"></div>
      <div class="detail-name" id="dName"></div>
      <div class="detail-badges" id="dBadges"></div>
    </div>
    <div class="detail-body" id="dBody"></div>
  </div>
</div>

// ── STATE ──
let allClients = RAW_DATA;
let filtered = [];
let currentSort = 'name';
let currentView = 'list';
let activeStatus = 'All';
let activeTrip = 'All';
let activeZone = 'All';
let activeState = 'All';
let activeCity = 'All';
let searchQ = '';

// ── CONSTANTS ──
const STATUSES = ['All','Existing','Potential'];
const TRIPS = ['All','Active Client','Under Communication','Yet to Pitch','Client Not Interested','VJD Not Interested','Pricing Issue','Payment Issue','Client Relationship Issue','Retailer'];
const ZONES = ['All','North','South','East','West','Export'];

const TRIP_BADGE = {
  'Active Client':      ['badge-green','✓ Active'],
  'Under Communication':['badge-amber','⟳ In Talk'],
  'Yet to Pitch':       ['badge-blue','◷ Yet to Pitch'],
  'Client Not Interested':['badge-red','✗ Not Interested'],
  'VJD Not Interested': ['badge-red','✗ VJD N/I'],
  'Pricing Issue':      ['badge-purple','⚠ Pricing'],
  'Payment Issue':      ['badge-purple','⚠ Payment'],
  'Client Relationship Issue':['badge-red','⚠ Relation'],
  'Retailer':           ['badge-teal','↑ Retailer'],
};
const STATUS_BADGE = {
  'Existing': ['badge-green','Existing'],
  'Potential':['badge-amber','Potential'],
};
const CARD_STATUS_CLASS = {
  'Active Client':'status-active',
  'Under Communication':'status-comm',
  'Yet to Pitch':'status-pitch',
  'Client Not Interested':'status-not-interested',
  'VJD Not Interested':'status-not-interested',
  'Pricing Issue':'status-issue',
  'Payment Issue':'status-issue',
  'Client Relationship Issue':'status-not-interested',
  'Retailer':'status-retailer',
};

// ── INIT ──
function init() {
  buildChips('statusChips', STATUSES, 'status', 'data-val');
  buildChips('tripChips', TRIPS, 'trip', 'data-ts');
  buildChips('zoneChips', ZONES, 'zone', 'data-val');
  buildMobileChips();
  buildStateList();
  applyFilters();
  
  document.getElementById('globalSearch').addEventListener('input', function(){
    searchQ = this.value.trim();
    document.getElementById('searchClear').classList.toggle('visible', searchQ.length > 0);
    applyFilters();
  });
}

function buildChips(containerId, values, type, attr) {
  const el = document.getElementById(containerId);
  el.innerHTML = values.map((v,i) => `<button class="chip${i===0?' active all-chip':''}" ${attr}="${v}" onclick="setFilter('${type}','${v}',this)">${v==='All'?'All':v}</button>`).join('');
}

function buildMobileChips() {
  const mfs = document.getElementById('mf-status');
  const mft = document.getElementById('mf-trip');
  mfs.innerHTML = STATUSES.map((v,i) => `<button class="chip${i===0?' active all-chip':''}" data-val="${v}" onclick="setFilter('status','${v}',this,true)">${v}</button>`).join('');
  mft.innerHTML = TRIPS.slice(0,5).map((v,i) => `<button class="chip${i===0?' active all-chip':''}" data-ts="${v}" onclick="setFilter('trip','${v}',this,true)">${v==='All'?'All':v.split(' ')[0]}</button>`).join('');
}

function buildStateList(filterText='') {
  const el = document.getElementById('stateList');
  // Get unique states with counts from current filtered set (before state filter)
  const stateMap = {};
  allClients.forEach(c => {
    if (!c.state) return;
    if (filterText && !c.state.toLowerCase().includes(filterText.toLowerCase())) return;
    if (!stateMap[c.state]) stateMap[c.state] = 0;
    stateMap[c.state]++;
  });
  const states = Object.entries(stateMap).sort((a,b)=>a[0].localeCompare(b[0]));
  
  const cityHTML = activeState !== 'All' ? buildCityPills() : '';
  
  el.innerHTML = `<div class="state-item${activeState==='All'?' active':''}" onclick="selectState('All')"><span>All States</span><span class="s-count">${allClients.length}</span></div>`
    + states.map(([s,n]) => `<div class="state-item${activeState===s?' active':''}" onclick="selectState('${s.replace(/'/g,"\'")}')"><span>${s}</span><span class="s-count">${n}</span></div>`).join('')
    + cityHTML;
}

function buildCityPills() {
  const cities = [...new Set(allClients.filter(c=>c.state===activeState && c.city).map(c=>c.city))].sort();
  if (cities.length < 2) return '';
  return `<div class="city-pills">
    <button class="city-pill${activeCity==='All'?' active':''}" onclick="selectCity('All')">All</button>
    ${cities.map(ci=>`<button class="city-pill${activeCity===ci?' active':''}" onclick="selectCity('${ci.replace(/'/g,"\'")}')">
      ${ci}</button>`).join('')}
  </div>`;
}

function filterStates(q) { buildStateList(q); }

function selectState(s) {
  activeState = s;
  activeCity = 'All';
  buildStateList(document.getElementById('stateSearch').value);
  applyFilters();
}
function selectCity(c) {
  activeCity = c;
  buildStateList(document.getElementById('stateSearch').value);
  applyFilters();
}

function setFilter(type, val, btn, isMobile=false) {
  if (type === 'status') {
    activeStatus = val;
    // sync both desktop and mobile chips
    document.querySelectorAll('[data-val]').forEach(b => {
      if (STATUSES.includes(b.dataset.val)) b.classList.toggle('active', b.dataset.val === val);
    });
  } else if (type === 'trip') {
    activeTrip = val;
    document.querySelectorAll('[data-ts]').forEach(b => {
      b.classList.toggle('active', b.dataset.ts === val);
    });
  } else if (type === 'zone') {
    activeZone = val;
    document.querySelectorAll('[data-val]').forEach(b => {
      if (ZONES.includes(b.dataset.val)) b.classList.toggle('active', b.dataset.val === val);
    });
  }
  applyFilters();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort'+s.charAt(0).toUpperCase()+s.slice(1)).classList.add('active');
  renderList(filtered);
}
function setView(v) {
  currentView = v;
  document.getElementById('clientList').classList.toggle('grid-view', v==='grid');
  document.getElementById('listBtn').classList.toggle('active', v==='list');
  document.getElementById('gridBtn').classList.toggle('active', v==='grid');
}

function clearSearch() {
  document.getElementById('globalSearch').value = '';
  searchQ = '';
  document.getElementById('searchClear').classList.remove('visible');
  applyFilters();
}

// ── FILTER + RENDER ──
function applyFilters() {
  let res = allClients;
  
  if (activeStatus !== 'All') res = res.filter(c => c.status === activeStatus);
  if (activeTrip !== 'All') res = res.filter(c => c.tripStatus === activeTrip);
  if (activeZone !== 'All') res = res.filter(c => c.zone === activeZone);
  if (activeState !== 'All') res = res.filter(c => c.state === activeState);
  if (activeCity !== 'All') res = res.filter(c => c.city === activeCity);
  
  if (searchQ) {
    const q = searchQ.toLowerCase();
    res = res.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.city.toLowerCase().includes(q) ||
      c.state.toLowerCase().includes(q) ||
      c.status.toLowerCase().includes(q) ||
      c.tripStatus.toLowerCase().includes(q) ||
      c.salesPerson.toLowerCase().includes(q) ||
      c.clientCode.toLowerCase().includes(q) ||
      c.address.toLowerCase().includes(q) ||
      c.reps.some(r => r.name.toLowerCase().includes(q) || r.contact.includes(q))
    );
  }
  
  filtered = res;
  document.getElementById('countDisplay').textContent = allClients.length;
  document.getElementById('resultCount').textContent = filtered.length;
  renderList(filtered);
}

function sortData(arr) {
  return [...arr].sort((a,b) => {
    if (currentSort==='name') return a.name.localeCompare(b.name);
    if (currentSort==='city') return (a.city+a.name).localeCompare(b.city+b.name);
    if (currentSort==='status') return (a.tripStatus+a.name).localeCompare(b.tripStatus+b.name);
    return 0;
  });
}

function highlight(text, q) {
  if (!q || !text) return text || '';
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'), m=>`<mark>${m}</mark>`);
}

function tripBadge(ts) {
  if (!ts) return '<span class="badge badge-gray">—</span>';
  const [cls,label] = TRIP_BADGE[ts] || ['badge-gray', ts];
  return `<span class="badge ${cls}">${label}</span>`;
}
function statusBadge(s) {
  if (!s) return '';
  const [cls,label] = STATUS_BADGE[s] || ['badge-gray',s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function renderList(data) {
  const el = document.getElementById('clientList');
  const sorted = sortData(data);
  
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No clients match your filters.<br>Try adjusting the search or filters.</div></div>`;
    return;
  }
  
  const q = searchQ;
  el.innerHTML = sorted.map((c,i) => {
    const sc = CARD_STATUS_CLASS[c.tripStatus] || (c.status==='Existing'?'status-active':'status-potential');
    const repText = c.reps.length ? c.reps.slice(0,2).map(r=>r.name).join(', ') + (c.reps.length>2?` +${c.reps.length-2}`:'') : '—';
    return `<div class="client-card ${sc}" onclick="openDetail(${i})" data-idx="${i}">
      <div class="card-header">
        <div class="card-name">${highlight(c.name, q)}</div>
        ${c.clientCode ? `<span class="card-code">${c.clientCode}</span>` : ''}
      </div>
      <div class="card-meta">
        ${statusBadge(c.status)}
        ${tripBadge(c.tripStatus)}
        ${c.zone ? `<span class="badge badge-gold">${c.zone}</span>` : ''}
      </div>
      <div class="card-location">📍 ${highlight(c.city,q)}${c.state&&c.city?', ':''}${highlight(c.state,q)}</div>
      ${repText !== '—' ? `<div class="card-rep"><span class="rep-dot"></span>${highlight(repText,q)}</div>` : ''}
    </div>`;
  }).join('');
  
  // store sorted for detail lookup
  window._sortedClients = sorted;
}

// ── DETAIL ──
function openDetail(visualIdx) {
  const c = window._sortedClients[visualIdx];
  if (!c) return;
  
  document.getElementById('dName').textContent = c.name;
  
  const badges = [statusBadge(c.status), tripBadge(c.tripStatus)];
  if (c.clientCode) badges.push(`<span class="badge badge-gold"># ${c.clientCode}</span>`);
  if (c.salesPerson) badges.push(`<span class="badge badge-gray">👤 ${c.salesPerson}</span>`);
  if (c.zone) badges.push(`<span class="badge badge-gold">🌐 ${c.zone}</span>`);
  document.getElementById('dBadges').innerHTML = badges.join('');
  
  let body = '';
  
  // Location
  if (c.address) {
    body += `<div><div class="detail-section-title">Address</div><div class="detail-address">📍 ${c.address}</div></div>`;
  }
  
  // Info Grid
  const fields = [
    ['City', c.city],
    ['State', c.state],
    ['Zone', c.zone],
    ['Sales Person', c.salesPerson],
    ['Status', c.status],
    ['Trip Status', c.tripStatus],
  ].filter(f=>f[1]);
  
  if (fields.length) {
    body += `<div><div class="detail-section-title">Details</div><div class="detail-grid">
      ${fields.map(([l,v])=>`<div class="detail-field"><label>${l}</label><span>${v}</span></div>`).join('')}
    </div></div>`;
  }
  
  // Website
  if (c.website) {
    body += `<div><div class="detail-section-title">Website</div>
      <a class="website-link" href="${c.website}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        ${c.website}
      </a></div>`;
  }
  
  // Representatives
  if (c.reps.length) {
    const initials = name => name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    body += `<div><div class="detail-section-title">Representatives (${c.reps.length})</div>
      <div class="rep-list">
        ${c.reps.map(r=>`<div class="rep-item">
          <div class="rep-avatar">${initials(r.name)}</div>
          <div class="rep-info">
            <div class="rep-name">${r.name}</div>
            <div class="rep-contact">${r.contact || '—'}</div>
          </div>
          ${r.contact ? `<button class="rep-call" onclick="window.location='tel:${r.contact}'" title="Call ${r.name}">📞</button>` : ''}
        </div>`).join('')}
      </div></div>`;
  }
  
  document.getElementById('dBody').innerHTML = body;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function overlayClick(e) { if (e.target === document.getElementById('detailOverlay')) closeDetail(); }

document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

// Init on load
window.addEventListener('DOMContentLoaded', init);
</script>
